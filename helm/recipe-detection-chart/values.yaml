replicaCount: 1

image:
  repository: hpe-recipe-detection
  tag: "0.0.1"
  pullPolicy: Never

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 8080

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

livenessProbe:
  httpGet:
    path: /api/health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /api/health
    port: http
  initialDelaySeconds: 15
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

nodeSelector: {}
tolerations: []
affinity: {}

recipeData:
  chartVersion: "0.0.1"
  recipes:
    - version: "1.3.0"
      description: "Base recipe with core analytics components"
      components:
        spark: "3.1.2"
        kafka: "3.1.0"
        airflow: "2.3.0"
        hbase: "2.4.6"
      upgradePaths: []
    - version: "1.3.1"
      description: "Patch release with minor component upgrades"
      components:
        spark: "3.2.0"
        kafka: "3.2.1"
        airflow: "2.4.1"
        hbase: "2.4.8"
      upgradePaths:
        - "1.3.0"
