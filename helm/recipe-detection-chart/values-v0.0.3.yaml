recipeData:
  chartVersion: 0.0.3
  catalog_name: HPE Monitoring Suite
  catalog_description: Centralized monitoring and observability platform
  release_date: '2026-06-04'
  catalog_status: GA
  maintainer: HPE SRE Team
  recipes:
  - version: 3.0.0
    description: Initial monitoring and observability platform release
    release_date: '2026-06-05'
    status: GA
    release_notes: Introduced Prometheus, Grafana, and Alert Manager for centralized
      monitoring, dashboarding, and alert management.
    components:
      Prometheus:
        version: 2.3.0
        release_date: '2026-06-05'
        upgrade_from:
        - 2.2.0
        upgrade_to:
        - 2.4.0
      Grafana:
        version: 3.3.0
        release_date: '2026-06-05'
        upgrade_from:
        - 3.2.0
        upgrade_to:
        - 3.4.0
      Alert-Manager:
        version: 4.3.0
        release_date: '2026-06-05'
        upgrade_from:
        - 4.2.0
        upgrade_to:
        - 4.4.0
    upgrade_to:
    - 3.1.0
  - version: 3.1.0
    description: Monitoring platform enhancements and reliability improvements
    release_date: '2026-06-06'
    status: GA
    release_notes: Upgraded monitoring components, improved dashboard performance,
      enhanced alert processing, and increased system stability.
    components:
      Prometheus:
        version: 2.4.0
        release_date: '2026-06-06'
        upgrade_from:
        - 2.3.0
        upgrade_to:
        - 2.5.0
      Grafana:
        version: 3.4.0
        release_date: '2026-06-06'
        upgrade_from:
        - 3.3.0
        upgrade_to:
        - 3.5.0
      Alert-Manager:
        version: 4.4.0
        release_date: '2026-06-06'
        upgrade_from:
        - 4.3.0
        upgrade_to:
        - 4.5.0
    upgrade_from:
    - 3.0.0
