apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "recipe-detection.fullname" . }}-config
  labels:
    {{- include "recipe-detection.labels" . | nindent 4 }}
data:
  chart-version: {{ .Values.recipeData.chartVersion | quote }}
  recipe-data.json: |
    {{- $data := dict "chartVersion" .Values.recipeData.chartVersion "recipes" .Values.recipeData.recipes }}
    {{ $data | toJson | nindent 4 }}
